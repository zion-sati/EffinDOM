name: Windows ARM64 Native CI

on:
  push:
    branches: [main]
    paths: &windows_arm64_paths
      - '.github/workflows/windows-arm64-native-ci.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'cmake/**'
      - 'NativeDeps.lock.json'
      - 'scripts/build-native-runtime.mjs'
      - 'scripts/windows/**'
      - 'v2/core/**'
      - 'v2/ui/**'
      - 'v2/native/common/**'
      - 'v2/native/windows/**'
  pull_request:
    paths: *windows_arm64_paths
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-11-arm
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64
      - name: Verify MSVC toolchain
        shell: pwsh
        run: |
          $compiler = (Get-Command cl -ErrorAction Stop).Source
          if ($compiler -notlike '*Microsoft Visual Studio*') {
            throw "Expected the MSVC cl.exe, got $compiler"
          }
          Write-Host "Using MSVC compiler: $compiler"
      - name: Verify ARM64 runner
        shell: pwsh
        run: if ($env:PROCESSOR_ARCHITECTURE -ne 'ARM64') { throw "Expected ARM64, got $env:PROCESSOR_ARCHITECTURE" }
      - name: Install build dependencies
        shell: pwsh
        run: |
          choco install --yes --no-progress ninja zstd
          python -m pip install meson
      - name: Install package dependencies
        run: npm ci
      - name: Cache verified native dependency SDK
        uses: actions/cache@v4
        with:
          path: ~/.cache/effindom/native-deps
          key: ${{ runner.os }}-arm64-native-deps-${{ hashFiles('NativeDeps.lock.json') }}
      - name: Build and test native runtime
        run: node scripts/build-native-runtime.mjs --target windows-arm64 --with-tests
