name: WASM CI

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 5.0.6
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache cmake meson ninja-build python3 zstd xvfb libxkbcommon-x11-0 libvulkan1 mesa-vulkan-drivers
      - name: Install package dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Cache verified WASM dependency SDK
        uses: actions/cache@v4
        with:
          path: ~/.cache/effindom/wasm-deps
          key: ${{ runner.os }}-wasm-deps-${{ hashFiles('WasmDeps.lock.json') }}
      - name: Cache Emscripten compilation results
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-emscripten-5.0.6-ccache-${{ hashFiles('WasmDeps.lock.json', 'CMakeLists.txt', 'cmake/**', 'v2/core/CMakeLists.txt', 'v2/ui/CMakeLists.txt', 'v2/core/scripts/build_wasm_arch.sh', 'v2/ui/scripts/build_wasm_arch.sh') }}
          restore-keys: |
            ${{ runner.os }}-emscripten-5.0.6-ccache-
      - name: Download and verify WASM dependency SDK
        run: node scripts/wasm-deps/prepare.mjs
      - name: Build browser runtime
        env:
          EFFINDOM_USE_CCACHE: '1'
          CCACHE_COMPILERCHECK: content
          CCACHE_MAXSIZE: 2G
        run: |
          ccache --zero-stats
          npm run build
          ccache --show-stats
      - name: Run browser runtime tests
        run: npm test
      - name: Upload verified runtime package inputs
        uses: actions/upload-artifact@v4
        with:
          name: runtime-package-inputs
          path: v2/browser-bridge/dist
          if-no-files-found: error
          retention-days: 90
